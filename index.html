<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f0f1a">
<title>MTG Draft Flashcards</title>
<link rel="manifest" id="manifestLink">
<style>
  :root {
    --bg:#0f0f1a; --surface:#1a1a2e; --card:#16213e;
    --accent:#e94560; --gold:#f0a500; --text:#eaeaea;
    --muted:#888; --border:#2a2a4a;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--bg); color:var(--text); font-family:'Segoe UI',sans-serif; min-height:100vh; }

  header { background:var(--surface); border-bottom:1px solid var(--border); padding:12px 16px; display:flex; align-items:center; gap:10px; }
  header h1 { font-size:1.1rem; color:var(--gold); flex:1; }
  #homeBtn { background:var(--surface); color:var(--muted); border:1px solid var(--border); padding:6px 12px; border-radius:6px; cursor:pointer; font-size:.85rem; display:none; }

  /* ── SET SCREEN ── */
  #setScreen { padding:24px 16px; max-width:600px; margin:0 auto; }
  #setScreen h2 { font-size:1.3rem; color:var(--gold); margin-bottom:6px; }
  #setScreen p  { color:var(--muted); font-size:.85rem; margin-bottom:20px; line-height:1.5; }

  .set-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:10px; margin-bottom:20px; }
  .set-card { background:var(--card); border:2px solid var(--border); border-radius:10px; padding:14px 12px; cursor:pointer; transition:all .2s; text-align:center; }
  .set-card:hover, .set-card.selected { border-color:var(--gold); background:#1e1e3a; }
  .set-card .set-code { font-size:1.2rem; font-weight:700; color:var(--gold); }
  .set-card .set-fmt  { font-size:.7rem; color:var(--muted); margin-top:2px; }
  .set-card .set-date { font-size:.7rem; color:var(--muted); margin-top:2px; }
  .no-sets { text-align:center; color:var(--muted); padding:30px; font-size:.9rem; }

  #refreshBtn { background:var(--surface); color:var(--text); border:1px solid var(--border); padding:10px 18px; border-radius:8px; cursor:pointer; font-size:.85rem; width:100%; margin-bottom:12px; }
  #loadSetBtn { background:var(--accent); color:#fff; border:none; padding:14px; border-radius:8px; font-size:1rem; font-weight:700; cursor:pointer; width:100%; }
  #loadSetBtn:disabled { opacity:.5; cursor:not-allowed; }

  /* ── LOADING ── */
  #loadScreen { display:none; flex-direction:column; align-items:center; justify-content:center; padding:60px 20px; text-align:center; min-height:60vh; }
  .spinner { width:48px; height:48px; border:4px solid var(--border); border-top-color:var(--gold); border-radius:50%; animation:spin 1s linear infinite; margin-bottom:20px; }
  @keyframes spin { to { transform:rotate(360deg); } }
  #loadMsg  { color:var(--text); font-size:1rem; margin-bottom:8px; }
  #loadSub  { color:var(--muted); font-size:.8rem; }
  #loadProg { width:260px; height:4px; background:var(--border); border-radius:4px; margin-top:16px; overflow:hidden; }
  #loadFill { height:100%; background:var(--gold); width:0; transition:width .3s; }

  /* ── FILTERS ── */
  #filters { background:var(--surface); padding:8px 14px; display:none; gap:8px; flex-wrap:wrap; border-bottom:1px solid var(--border); }
  .filter-group { display:flex; gap:5px; flex-wrap:wrap; align-items:center; }
  .filter-group label { font-size:.72rem; color:var(--muted); }
  .pill { padding:4px 10px; border-radius:20px; border:1px solid var(--border); background:var(--card); cursor:pointer; font-size:.75rem; transition:all .2s; }
  .pill.active { background:var(--gold); color:#000; border-color:var(--gold); font-weight:600; }
  .pill.color-W.active{background:#f9f6e8;color:#333;border-color:#ccc;}
  .pill.color-U.active{background:#0e5aa7;color:#fff;}
  .pill.color-B.active{background:#555;color:#fff;border-color:#777;}
  .pill.color-R.active{background:#b22222;color:#fff;}
  .pill.color-G.active{background:#1a5c2e;color:#fff;}
  .pill.color-M.active{background:#8b6914;color:#fff;}

  /* ── STUDY ── */
  #studyScreen { display:none; flex-direction:column; align-items:center; padding:20px 16px; }
  #progress { width:100%; max-width:480px; margin-bottom:14px; }
  #progBar  { height:4px; background:var(--border); border-radius:4px; overflow:hidden; }
  #progFill { height:100%; background:var(--accent); width:0; transition:width .3s; }
  #progText { font-size:.75rem; color:var(--muted); margin-top:4px; text-align:center; }

  #cardWrapper { perspective:1000px; width:100%; max-width:400px; height:500px; cursor:pointer; }
  #flashcard   { width:100%; height:100%; position:relative; transform-style:preserve-3d; transition:transform .45s cubic-bezier(.4,0,.2,1); }
  #flashcard.flipped { transform:rotateY(180deg); }
  .face { position:absolute; width:100%; height:100%; backface-visibility:hidden; border-radius:16px; overflow:hidden; }

  .front { background:var(--card); border:2px solid var(--border); display:flex; flex-direction:column; }
  .card-header { padding:12px 14px 8px; display:flex; justify-content:space-between; align-items:center; }
  .rarity-badge { font-size:.68rem; font-weight:700; text-transform:uppercase; padding:3px 8px; border-radius:10px; }
  .rarity-common{background:#444;color:#ccc;} .rarity-uncommon{background:#5a7a8a;color:#dff;}
  .rarity-rare{background:#4a3d6a;color:#dcd;} .rarity-mythic{background:#8b3a00;color:#ffd;}
  .color-dot{width:20px;height:20px;border-radius:50%;border:2px solid rgba(255,255,255,.2);}
  .dot-W{background:#f9f6e8;} .dot-U{background:#0e5aa7;} .dot-B{background:#666;}
  .dot-R{background:#b22222;} .dot-G{background:#1a5c2e;} .dot-M{background:linear-gradient(135deg,#0e5aa7,#b22222);} .dot-C{background:#888;}

  .card-img-area { flex:1; display:flex; align-items:center; justify-content:center; background:#0a0a18; overflow:hidden; }
  .card-img-area img { max-width:100%; max-height:100%; object-fit:contain; }
  .card-img-placeholder { text-align:center; color:var(--muted); padding:0 12px; }
  .card-img-placeholder .big-name { font-size:1.3rem; font-weight:700; color:var(--text); margin-top:8px; }
  .card-footer { padding:10px; text-align:center; font-size:.75rem; color:var(--muted); }

  .back { background:var(--card); border:2px solid var(--gold); transform:rotateY(180deg); display:flex; flex-direction:column; align-items:center; justify-content:center; padding:24px 20px; gap:14px; }
  .back-name { font-size:1.3rem; font-weight:700; text-align:center; color:var(--gold); }
  .stats-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; width:100%; }
  .stat-box { background:var(--surface); border-radius:10px; padding:10px; text-align:center; }
  .stat-val { font-size:1.4rem; font-weight:700; }
  .stat-lbl { font-size:.68rem; color:var(--muted); margin-top:2px; }
  .grade-badge { font-size:2rem; font-weight:900; }
  .rank-line { font-size:.85rem; color:var(--text); text-align:center; }
  .rank-line span { color:var(--gold); font-weight:700; }

  #controls { display:flex; gap:10px; margin-top:16px; justify-content:center; }
  .btn { padding:12px 18px; border-radius:8px; border:none; cursor:pointer; font-size:.9rem; font-weight:600; min-height:48px; min-width:70px; }
  .btn-prev    { background:var(--surface); color:var(--text); border:1px solid var(--border); }
  .btn-next    { background:var(--accent); color:#fff; }
  .btn-flip    { background:var(--gold); color:#000; }
  .btn-shuffle { background:var(--surface); color:var(--text); border:1px solid var(--border); }
  #legend { font-size:.7rem; color:var(--muted); margin-top:8px; text-align:center; }

  #errorBox { display:none; background:#2a1a1a; border:1px solid var(--accent); border-radius:10px; padding:14px; margin-top:16px; color:#ffaaaa; font-size:.82rem; line-height:1.5; }
</style>
</head>
<body>

<header>
  <h1>🃏 MTG Draft Flashcards</h1>
  <button id="homeBtn" onclick="goHome()">⬅ Sets</button>
</header>

<!-- SET SCREEN -->
<div id="setScreen">
  <div style="padding:24px 16px; max-width:600px; margin:0 auto;">
    <h2>Your Sets</h2>
    <p>These are the JSON files uploaded to your GitHub. Run the Python script for a new set, upload the JSON to GitHub, then tap Refresh.</p>
    <button id="refreshBtn" onclick="scanSets()">🔄 Refresh Sets</button>
    <div class="set-grid" id="setGrid"></div>
    <div id="errorBox"></div>
    <button id="loadSetBtn" onclick="loadSelectedSet()" disabled>Select a set first</button>
  </div>
</div>

<!-- LOADING SCREEN -->
<div id="loadScreen">
  <div class="spinner"></div>
  <div id="loadMsg">Loading…</div>
  <div id="loadSub"></div>
  <div id="loadProg"><div id="loadFill"></div></div>
</div>

<!-- FILTERS -->
<div id="filters">
  <div class="filter-group">
    <label>Rarity:</label>
    <span class="pill active" data-filter="rarity" data-val="all">All</span>
    <span class="pill" data-filter="rarity" data-val="common">C</span>
    <span class="pill" data-filter="rarity" data-val="uncommon">U</span>
    <span class="pill" data-filter="rarity" data-val="rare">R</span>
    <span class="pill" data-filter="rarity" data-val="mythic">M</span>
  </div>
  <div class="filter-group">
    <label>Color:</label>
    <span class="pill active" data-filter="color" data-val="all">All</span>
    <span class="pill color-W" data-filter="color" data-val="W">W</span>
    <span class="pill color-U" data-filter="color" data-val="U">U</span>
    <span class="pill color-B" data-filter="color" data-val="B">B</span>
    <span class="pill color-R" data-filter="color" data-val="R">R</span>
    <span class="pill color-G" data-filter="color" data-val="G">G</span>
    <span class="pill color-M" data-filter="color" data-val="M">Multi</span>
  </div>
</div>

<!-- STUDY SCREEN -->
<div id="studyScreen">
  <div id="progress">
    <div id="progBar"><div id="progFill"></div></div>
    <div id="progText"></div>
  </div>
  <div id="cardWrapper" onclick="flipCard()">
    <div id="flashcard">
      <div class="face front" id="frontFace"></div>
      <div class="face back"  id="backFace"></div>
    </div>
  </div>
  <div id="legend">Tap card to flip · Swipe left/right to navigate</div>
  <div id="controls">
    <button class="btn btn-prev"    onclick="navigate(-1)">◀ Prev</button>
    <button class="btn btn-flip"    onclick="flipCard()">↩ Flip</button>
    <button class="btn btn-shuffle" onclick="shuffleDeck()">🔀</button>
    <button class="btn btn-next"    onclick="navigate(1)">Next ▶</button>
  </div>
</div>

<script>
// ── CONFIG — update this if your GitHub username changes ──────────────────
const GITHUB_USER = 'Reign91';
const GITHUB_REPO = 'mtg-flashcards';
const BASE_URL    = `https://${GITHUB_USER}.github.io/${GITHUB_REPO}/`;
const API_URL     = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/`;

// ── STATE ──────────────────────────────────────────────────────────────────
let allCards=[], deck=[], idx=0, flipped=false;
let filterRarity='all', filterColor='all';
let selectedFile='', currentMeta={};

// ── SCAN GITHUB FOR JSON FILES ─────────────────────────────────────────────
async function scanSets() {
  const grid = document.getElementById('setGrid');
  grid.innerHTML = '<div class="no-sets">Scanning GitHub…</div>';
  hideError();

  try {
    const r = await fetch(API_URL);
    if (!r.ok) throw new Error(`GitHub API error: ${r.status}`);
    const files = await r.json();
    const jsonFiles = files.filter(f => f.name.startsWith('flashcard_data_') && f.name.endsWith('.json'));

    if (!jsonFiles.length) {
      grid.innerHTML = '<div class="no-sets">No flashcard JSON files found.<br>Run the Python script and upload a JSON file to GitHub.</div>';
      return;
    }

    grid.innerHTML = '';
    jsonFiles.forEach(f => {
      // parse name like flashcard_data_SOS_PremierDraft.json
      const parts  = f.name.replace('flashcard_data_','').replace('.json','').split('_');
      const code   = parts[0];
      const fmt    = parts.slice(1).join(' ') || 'PremierDraft';
      const el     = document.createElement('div');
      el.className = 'set-card';
      el.innerHTML = `<div class="set-code">${code}</div><div class="set-fmt">${fmt}</div>`;
      el.onclick   = () => selectSet(f.name, el, code, fmt);
      grid.appendChild(el);
    });

  } catch(e) {
    grid.innerHTML = '';
    showError('Could not reach GitHub. Check your internet connection.\n' + e.message);
  }
}

function selectSet(filename, el, code, fmt) {
  document.querySelectorAll('.set-card').forEach(x => x.classList.remove('selected'));
  el.classList.add('selected');
  selectedFile = filename;
  const btn = document.getElementById('loadSetBtn');
  btn.disabled = false;
  btn.textContent = `Study ${code} — ${fmt}`;
}

// ── LOAD SELECTED SET ──────────────────────────────────────────────────────
async function loadSelectedSet() {
  if (!selectedFile) return;
  showScreen('load');
  setMsg('Loading flashcard data…', '');
  setProgress(10);

  try {
    const url = `${BASE_URL}${selectedFile}`;
    const r   = await fetch(url);
    if (!r.ok) throw new Error(`Could not load ${selectedFile} (${r.status}). Make sure the file is uploaded to GitHub.`);
    const data = await r.json();

    allCards    = data.cards || [];
    currentMeta = data.meta  || {};

    if (!allCards.length) throw new Error('No cards found in this file.');

    setProgress(100);
    await sleep(200);

    showScreen('study');
    document.getElementById('homeBtn').style.display  = 'block';
    document.getElementById('filters').style.display  = 'flex';
    applyFilters();

  } catch(e) {
    showScreen('set');
    showError(e.message);
  }
}

// ── RENDER ─────────────────────────────────────────────────────────────────
function applyFilters() {
  deck = allCards.filter(c =>
    (filterRarity==='all' || c.rarity===filterRarity) &&
    (filterColor==='all'  || c.color===filterColor)
  );
  idx=0; flipped=false;
  if (deck.length) render();
}

function render() {
  const c = deck[idx];
  document.getElementById('flashcard').classList.remove('flipped');
  flipped = false;
  document.getElementById('progFill').style.width = ((idx+1)/deck.length*100)+'%';
  document.getElementById('progText').textContent =
    `${idx+1} / ${deck.length} · ${currentMeta.expansion||''} ${currentMeta.format||''}`;

  const imgHtml = c.image
    ? `<img src="${c.image}" alt="${c.name}" loading="lazy">`
    : `<div class="card-img-placeholder"><div style="font-size:3rem">🃏</div><div class="big-name">${c.name}</div></div>`;

  document.getElementById('frontFace').innerHTML = `
    <div class="card-header">
      <span class="rarity-badge rarity-${c.rarity}">${c.rarity}</span>
      <div class="color-dot dot-${c.color}"></div>
    </div>
    <div class="card-img-area">${imgHtml}</div>
    <div class="card-footer">Tap to reveal stats</div>`;

  const grade = calcGrade(c.gihwr);
  const rank  = getRank(c);
  const cname = {W:'White',U:'Blue',B:'Black',R:'Red',G:'Green',M:'Multicolor',C:'Colorless'};
  const gcls  = 'g'+grade.replace('+','plus');

  document.getElementById('backFace').innerHTML = `
    <div class="back-name">${c.name}</div>
    <div class="stats-grid">
      <div class="stat-box"><div class="stat-val" style="color:#4caf50">${c.gihwr}%</div><div class="stat-lbl">GIH Win Rate</div></div>
      <div class="stat-box"><div class="stat-val grade-badge" style="color:${gradeColor(grade)}">${grade}</div><div class="stat-lbl">Grade</div></div>
      <div class="stat-box"><div class="stat-val" style="color:#64b5f6">${c.alsa}</div><div class="stat-lbl">Avg Pick</div></div>
      <div class="stat-box"><div class="stat-val" style="color:#ffb74d">${c.gpwr||'—'}%</div><div class="stat-lbl">GP Win Rate</div></div>
    </div>
    <div class="rank-line">Rank <span>#${rank}</span> ${c.rarity} in <span>${cname[c.color]||c.color}</span></div>`;
}

function gradeColor(g) {
  if (g==='A+'||g==='A') return '#4caf50';
  if (g==='B+'||g==='B') return '#8bc34a';
  if (g==='C+'||g==='C') return '#ffeb3b';
  if (g==='D') return '#ff9800';
  return '#e94560';
}

function calcGrade(wr) {
  const vals = allCards.filter(c=>c.gihwr>0).map(c=>c.gihwr);
  const mean = vals.reduce((a,b)=>a+b,0)/vals.length;
  const std  = Math.sqrt(vals.reduce((a,b)=>a+(b-mean)**2,0)/vals.length)||1;
  const z = (wr-mean)/std;
  if (z>=2)    return 'A+';
  if (z>=1.33) return 'A';
  if (z>=0.67) return 'B+';
  if (z>=0)    return 'B';
  if (z>=-0.67)return 'C+';
  if (z>=-1.33)return 'C';
  if (z>=-1.67)return 'D';
  return 'F';
}

function getRank(card) {
  return allCards
    .filter(c=>c.rarity===card.rarity&&c.color===card.color)
    .sort((a,b)=>b.gihwr-a.gihwr)
    .findIndex(c=>c.name===card.name)+1;
}

// ── CONTROLS ───────────────────────────────────────────────────────────────
function navigate(dir) { idx=(idx+dir+deck.length)%deck.length; render(); }
function flipCard() { flipped=!flipped; document.getElementById('flashcard').classList.toggle('flipped',flipped); }
function shuffleDeck() {
  for(let i=deck.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[deck[i],deck[j]]=[deck[j],deck[i]];}
  idx=0; render();
}
function goHome() {
  showScreen('set');
  document.getElementById('homeBtn').style.display = 'none';
  document.getElementById('filters').style.display = 'none';
  scanSets();
}

document.querySelectorAll('.pill').forEach(p => {
  p.onclick = () => {
    const f=p.dataset.filter, v=p.dataset.val;
    document.querySelectorAll(`.pill[data-filter="${f}"]`).forEach(x=>x.classList.remove('active'));
    p.classList.add('active');
    if(f==='rarity') filterRarity=v;
    if(f==='color')  filterColor=v;
    applyFilters();
  };
});

// Keyboard
document.addEventListener('keydown', e => {
  if (!deck.length) return;
  if (e.key==='ArrowRight'||e.key==='d') navigate(1);
  if (e.key==='ArrowLeft' ||e.key==='a') navigate(-1);
  if (e.key===' '||e.key==='f') { e.preventDefault(); flipCard(); }
});

// Swipe
let tx=0, ty=0;
document.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY;},{passive:true});
document.addEventListener('touchend',e=>{
  if(!deck.length) return;
  const dx=e.changedTouches[0].clientX-tx, dy=e.changedTouches[0].clientY-ty;
  if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>50) dx<0?navigate(1):navigate(-1);
},{passive:true});

// ── HELPERS ────────────────────────────────────────────────────────────────
function showScreen(s) {
  document.getElementById('setScreen').style.display  = s==='set'  ? 'block':'none';
  document.getElementById('loadScreen').style.display = s==='load' ? 'flex' :'none';
  document.getElementById('studyScreen').style.display= s==='study'? 'flex' :'none';
}
function setMsg(m,s){ document.getElementById('loadMsg').textContent=m; document.getElementById('loadSub').textContent=s; }
function setProgress(p){ document.getElementById('loadFill').style.width=p+'%'; }
function showError(m){ const e=document.getElementById('errorBox'); e.textContent='⚠ '+m; e.style.display='block'; }
function hideError(){ document.getElementById('errorBox').style.display='none'; }
function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }

// ── PWA ────────────────────────────────────────────────────────────────────
const mf = {name:"MTG Draft Flashcards",short_name:"MTG Cards",start_url:".",display:"standalone",background_color:"#0f0f1a",theme_color:"#0f0f1a",icons:[{src:"data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect width='192' height='192' rx='24' fill='%230f0f1a'/><text y='130' x='20' font-size='130'>🃏</text></svg>",sizes:"192x192",type:"image/svg+xml"}]};
document.getElementById('manifestLink').href = URL.createObjectURL(new Blob([JSON.stringify(mf)],{type:'application/json'}));
if('serviceWorker' in navigator){const sw=`const C='mtg-v2';self.addEventListener('install',e=>e.waitUntil(caches.open(C).then(c=>c.addAll(['./', './index.html']))));self.addEventListener('fetch',e=>e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request))));`;navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:'text/javascript'}))).catch(()=>{});}

// Auto-scan on load
scanSets();
</script>
</body>
</html>
